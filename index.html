<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario Alta Gracia - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <link rel="manifest" href="/manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>


    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>


    <meta name="theme-color" content="#000000">
    <style>
        /* Ajustar altura y bordes para que coincida con Tailwind rounded-xl */
        .select2-container .select2-selection--single {
            height: 46px !important;
            border: 1px solid #e5e7eb !important;
            /* border-gray-200 */
            border-radius: 0.75rem !important;
            /* rounded-xl */
        }

        /* Centrar el texto verticalmente */
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 46px !important;
            padding-left: 12px !important;
            font-size: 0.875rem !important;
            /* text-sm */
            font-weight: 600;
        }

        /* Personalizar el color de la opción seleccionada */
        .select2-container--default .select2-results__option--highlighted[aria-selected] {
            background-color: #243e36 !important;
        }

        /* Ajustar la flecha */
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 46px !important;
        }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;700&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #d1d5db;
        }

        .font-alta {
            font-family: 'Cinzel', serif;
        }

        .receta-container {
            width: 100%;
            max-width: 1122px;
            aspect-ratio: 1122 / 794;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            margin: auto;
        }

        #panelControl {
            min-height: 865px;
        }

        #receta {
            width: 1122px;
            height: 794px;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            background: white;
        }

        .header-container {
            position: relative;
            height: 180px;
            width: 90%;
            left: 112px;
            background-color: #243e36 !important;
            mask-image: radial-gradient(circle at 0px 90px, transparent 110px, black 111px);
            -webkit-mask-image: radial-gradient(circle at 0px 90px, transparent 110px, black 111px);
        }

        .logo-circle {
            position: absolute;
            left: 3px;
            top: 25px;
            height: 130px;

            background: white;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .divider {
            position: absolute;
            left: 50%;
            top: 220px;
            bottom: 80px;
            width: 2px;
            background-color: #c2a37d;
            opacity: 0.3;
        }

        .footer-alta {
            background-color: #243e36 !important;
            height: 55px;
            width: 100%;
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="p-2 md:p-10">
    <div class="max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-6">

        <div id="panelControl"
            class="w-full lg:w-1/4 bg-slate-50 p-8 rounded-3xl shadow-2xl border-t-[10px] border-[#243e36] h-fit">
            <header class="mb-8">
                <h2 class="text-2xl font-bold text-[#243e36] flex items-center gap-3">
                    <i data-lucide="file-text" class="w-6 h-6"></i>
                    Hacer Receta
                </h2>
                <p class="text-gray-500 text-xs mt-1">Complete los campos para generar la orden médica.</p>
            </header>

            <div class="space-y-6">
                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36] transition-colors">
                        Nombre del Paciente
                    </label>
                    <div class="relative">
                        <i data-lucide="user"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="inPaciente" placeholder="Ej. Juan Pérez"
                            class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl outline-none uppercase font-semibold text-sm transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10 shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Edad</label>
                        <input type="number" id="inEdad" placeholder="00"
                            class="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none text-sm transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10">
                    </div>
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1 ml-1">Fecha</label>
                        <div class="relative">
                            <i data-lucide="calendar"
                                class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input type="text" id="inFecha" readonly
                                class="w-full pl-10 pr-2 py-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-500 text-xs cursor-not-allowed">
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Tipo
                            de Paciente</label>
                        <select id="selTipoPaciente"
                            class="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none font-bold text-sm appearance-none cursor-pointer focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10">
                            <option value="adulto">Adulto</option>
                            <option value="nino">Niño</option>
                        </select>
                    </div>

                    <div id="divRangoNino" class="hidden animate-fade-in">
                        <label
                            class="block text-[11px] font-bold text-blue-600 uppercase tracking-wider mb-1 ml-1">Rango
                            de Edad Infantil</label>
                        <select id="selRangoNino"
                            class="w-full p-3 bg-blue-50 border border-blue-200 rounded-xl text-sm text-blue-800 outline-none">
                            <option value="5-6">5 a 6 años</option>
                            <option value="2">2 años</option>
                        </select>
                    </div>
                </div>

                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Procedimiento</label>
                    <div class="relative">
                        <i data-lucide="stethoscope"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <select id="selProc"
                            class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl outline-none font-bold text-gray-700 text-sm appearance-none cursor-pointer focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10">
                            <option value="">Seleccionar...</option>
                            <option value="extraccion">Extracción Dental</option>
                            <option value="periodoncia">Periodoncia</option>
                            <option value="alveolitis">Alveolitis</option>
                        </select>
                    </div>
                </div>

                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Prescripción
                        Médica</label>
                    <textarea id="inPres" rows="3" placeholder="Medicamentos y dosis..."
                        class="w-full p-4 bg-white border border-gray-200 rounded-xl outline-none text-sm italic transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10 resize-none"></textarea>
                </div>

                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Indicaciones
                        Adicionales</label>
                    <textarea id="inInd" rows="3" placeholder="Recomendaciones de cuidado..."
                        class="w-full p-4 bg-white border border-gray-200 rounded-xl outline-none text-[12px] transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10 resize-none"></textarea>
                </div>

                <button onclick="descargarPDF()"
                    class="w-full bg-[#243e36] text-white py-5 rounded-2xl font-bold hover:bg-[#1a2d27] transition-all shadow-xl hover:shadow-[#243e36]/20 active:scale-95 flex items-center justify-center gap-2 mt-4">
                    <i data-lucide="download-cloud" class="w-5 h-5"></i>
                    GENERAR DOCUMENTO PDF
                </button>
            </div>
        </div>



        <div class="w-full lg:w-3/4 flex justify-center items-start">
            <div id="recetaContainer" class="receta-container">
                <div id="receta">
                    <div class="logo-circle">
                        <img src="denta.png" alt="Logo">
                    </div>
                    <div class="header-container">
                        <div class="absolute inset-0 flex flex-col justify-center items-center text-center pl-24 pr-10">
                            <h1 class="font-alta text-white text-3xl tracking-[0.2em] mb-1">Consultorio Odontológico
                            </h1>
                            <h2 class="font-alta text-[#c2a37d] text-5xl font-bold tracking-[0.1em] uppercase">Alta
                                Gracia</h2>
                            <div class="w-full flex justify-between px-10 mt-6 text-[13px] text-white/80 italic">
                                <div>CD. ANA PAULA GARCIA MIRANDA <span class="ml-4 text-[#c2a37d]">COP: 58688</span>
                                </div>
                                <div class="text-right leading-tight">CITAS: 936311361 <br> LEONCIO PRADO 960 _
                                    HUAMACHUCO</div>
                            </div>
                        </div>
                    </div>

                    <div class="px-16 pt-12 pb-6 flex justify-between items-end text-[13px] font-bold text-gray-700">
                        <div class="flex-grow flex border-b border-gray-400 pb-1 italic uppercase">PACIENTE: <span
                                id="pvPaciente" class="font-normal ml-3 text-black not-italic uppercase"></span></div>
                        <div class="w-32 flex border-b border-gray-400 pb-1 mx-6 italic uppercase">EDAD: <span
                                id="pvEdad" class="font-normal ml-3 text-black not-italic"></span></div>
                        <div class="w-44 flex border-b border-gray-400 pb-1 justify-end italic uppercase">FECHA: <span
                                id="pvFecha" class="font-normal ml-3 text-black not-italic"></span></div>
                    </div>

                    <div class="flex-grow flex px-16 py-8 relative">
                        <div class="divider"></div>
                        <div class="w-1/2 pr-12 z-10">
                            <h3 class="text-center font-bold text-gray-400 tracking-[0.4em] text-xs mb-8 uppercase">
                                Prescripción</h3>
                            <div id="pvPres"
                                class="text-[14px] text-gray-800 whitespace-pre-line leading-relaxed italic min-h-[300px]">
                            </div>
                        </div>
                        <div class="w-1/2 pl-12 z-10">
                            <h3 class="text-center font-bold text-gray-400 tracking-[0.4em] text-xs mb-8 ">
                                Indicaciones</h3>
                            <div id="pvInd"
                                class="text-[14px] text-gray-800 whitespace-pre-line leading-relaxed italic min-h-[300px]">
                            </div>
                        </div>
                    </div>
                    <div class="footer-alta">
                        <p class="text-white text-[12px] tracking-[0.7em] font-light italic uppercase">¡ Cuidamos tu
                            salud dental !</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        $(document).ready(function () {
            // Inicializar Selects
            $('#selTipoPaciente').select2({
                minimumResultsForSearch: Infinity,
                width: '100%'
            });

            $('#selProc').select2({
                placeholder: "Seleccionar procedimiento...",
                allowClear: true,
                width: '100%'
            });

            // --- RE-CONECTAR LA REACTIVIDAD ---

            // Escuchar cambio en Tipo de Paciente (vía Select2)
            $('#selTipoPaciente').on('change', function () {
                const value = $(this).val();
                const divRango = document.getElementById('divRangoNino');

                if (value === 'nino') {
                    divRango.classList.remove('hidden');
                } else {
                    divRango.classList.add('hidden');
                }
                actualizarContenido();
            });

            // Escuchar cambio en Procedimiento (vía Select2)
            $('#selProc').on('change', function () {
                actualizarContenido();
            });

            // Escuchar cambio en Rango Niño
            $('#selRangoNino').on('change', function () {
                actualizarContenido();
            });
        });
    </script>
    <script>
        // Inicializar iconos de Lucide
        lucide.createIcons();
    </script>
    <script>
        // --- LÓGICA DE INTERFAZ ---
        function ajustarEscala() {
            const container = document.getElementById('recetaContainer');
            const content = document.getElementById('receta');
            const escala = container.offsetWidth / 1122;
            content.style.transform = `scale(${escala})`;
        }
        window.addEventListener('resize', ajustarEscala);

        window.onload = function () {
            ajustarEscala();
            const hoy = new Date();
            const fechaFormateada = hoy.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
            document.getElementById('inFecha').value = fechaFormateada;
            document.getElementById('pvFecha').innerText = fechaFormateada;
        };

        const recetasData = {
            "periodoncia": { p: "", i: "Realizar enjuagues con 5 ml de VITIS sin diluir, durante 30 segundos, como mínimo 2 veces al día después de cada cepillado.\n\nPara una mayor eficacia es recomendable no mezclar con agua y evitar comer o beber inmediatamente después de su uso." },
            "alveolitis": { p: "-Amoxicilina 500 mg más acido clavulánico 125 mg x 5 días.\n15 tabletas cada 8 horas \n\n- Etoricoxib 120 mg  una vez al día x 3 días.\n- Después de cada comida.", i: "" },
            "extraccion_adulto": { p: "- Amoxicilina 500 mg x 5 días # 15 tabletas cada 8 horas \n\n- Dolocordralan extraforte x 2 días # 6 tabletas cada 8 horas.\n\n Después de cada comida ", i: "Evitar:\n- Fumar\n- Escupir las primeras 24 hrs.\n- Actividad física por 3 días.\n- Sol y comidas picantes.\n\nDieta:\n- Helado.\n- Verduras al vapor.\n- Dieta blanda." },
            "extraccion_nino_5-6": { p: "- Jarabe Amoxicilina 250 mg x 5 días: 7 ml cada 8 horas.\n\n- Jarabe Ibuprofeno 100 mg x 2 días: 7 ml cada 8 horas.\n\n Las dos juntas después de cada comida.", i: "" },
            "extraccion_nino_2": { p: "- Amoxicilina 250 mg x 5 días: 5 ml cada 8 horas.\n- Ibuprofeno 100 mg x 2 días: 5 ml cada 8 horas.\n\n Las dos juntas después de cada comida.", i: "" }
        };

        document.getElementById('selTipoPaciente').addEventListener('change', function () {
            const divRango = document.getElementById('divRangoNino');
            this.value === 'nino' ? divRango.classList.remove('hidden') : divRango.classList.add('hidden');
            actualizarContenido();
        });

        document.getElementById('selRangoNino').addEventListener('change', actualizarContenido);
        document.getElementById('selProc').addEventListener('change', actualizarContenido);

        function actualizarContenido() {
            const proc = document.getElementById('selProc').value;
            const tipo = document.getElementById('selTipoPaciente').value;
            const rango = document.getElementById('selRangoNino').value;
            let clave = proc === 'extraccion' ? (tipo === 'adulto' ? 'extraccion_adulto' : `extraccion_nino_${rango}`) : proc;
            if (recetasData[clave]) {
                document.getElementById('inPres').value = recetasData[clave].p;
                document.getElementById('inInd').value = recetasData[clave].i;
                document.getElementById('pvPres').innerText = recetasData[clave].p;
                document.getElementById('pvInd').innerText = recetasData[clave].i;
            }
        }

        ['inPaciente', 'inEdad', 'inPres', 'inInd'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                document.getElementById(id.replace('in', 'pv')).innerText = e.target.value;
            });
        });

        // --- NUEVA LÓGICA DE PDF-LIB ---
        async function descargarPDF() {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const btn = document.querySelector('button');
            const originalText = btn.innerText;

            btn.innerText = "GENERANDO...";
            btn.disabled = true;

            try {
                // 1. Crear documento
                const pdfDoc = await PDFDocument.create();

                // 2. Cargar la imagen de fondo (plantilla)
                // Nota: Asegúrate de que 'plantilla.png' esté en la misma carpeta que el HTML
                const response = await fetch('plantilla.png');
                if (!response.ok) throw new Error("No se pudo cargar la imagen de la plantilla");
                const imageBytes = await response.arrayBuffer();

                let fondoImg;
                try {
                    fondoImg = await pdfDoc.embedPng(imageBytes);
                } catch (e) {
                    // Intenta cargar como JPG si falla como PNG
                    fondoImg = await pdfDoc.embedJpg(imageBytes);
                }

                // 3. Añadir página (A4 Horizontal en px: 1122x794)
                const page = pdfDoc.addPage([1122, 794]);
                const { width, height } = page.getSize();

                // Dibujar el fondo cubriendo toda la página
                page.drawImage(fondoImg, {
                    x: 0,
                    y: 0,
                    width: width,
                    height: height,
                });

                // 4. Configurar fuentes estándar de pdf-lib
                const fontRegular = await pdfDoc.embedFont(StandardFonts.Helvetica);
                const fontBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                const fontItalic = await pdfDoc.embedFont(StandardFonts.HelveticaOblique);

                // 5. Capturar datos dinámicos de los inputs
                const nombre = document.getElementById('inPaciente').value.toUpperCase() || '';
                const edad = document.getElementById('inEdad').value || '';
                // La fecha ya viene pre-formateada en 'inFecha'
                const fecha = document.getElementById('inFecha').value;
                const prescripcion = document.getElementById('inPres').value;
                const indicaciones = document.getElementById('inInd').value;

                const colorTexto = rgb(0, 0, 0); // Negro puro para mejor legibilidad al imprimir

                // --- 6. POSICIONAR TEXTO DINÁMICO ---
                // El origen (0,0) está en la esquina inferior izquierda

                // DATOS DE CABECERA (Y ≈ 532 es la línea horizontal)
                // Paciente
                page.drawText(nombre, { x: 155, y: 597, size: 14, font: fontRegular, color: colorTexto });
                // Edad
                page.drawText(edad, { x: 750, y: 597, size: 14, font: fontRegular, color: colorTexto });
                // Fecha
                page.drawText(fecha, { x: 1015, y: 597, size: 14, font: fontRegular, color: colorTexto });

                // TEXTOS MULTI-LÍNEA INFERIORES

                // Prescripción (Lado izquierdo, itálica)
                page.drawText(prescripcion, {
                    x: 100, // Coordenada X de inicio
                    y: 460, // Coordenada Y de inicio (comienza más abajo que la cabecera)
                    size: 13,
                    font: fontItalic,
                    lineHeight: 18,
                    maxWidth: 420, // Ancho máximo antes de hacer salto de línea automático
                    color: colorTexto
                });

                // Indicaciones (Lado derecho, regular)
                page.drawText(indicaciones, {
                    x: 610, // Coordenada X de inicio
                    y: 460, // Coordenada Y de inicio
                    size: 13,
                    font: fontItalic,
                    lineHeight: 18,
                    maxWidth: 420, // Ancho máximo
                    color: colorTexto
                });

                // 7. Generar y descargar el archivo de forma compatible
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });

                // Crear nombre de archivo basado en el paciente
                const fileName = `Receta_${nombre.replace(/\s+/g, '_') || 'Paciente'}.pdf`;

                // Método de descarga compatible con PC y Móvil
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a); // Necesario para Firefox móvil
                a.click();

                // Limpieza
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);

            } catch (err) {
                console.error("Error al generar el PDF:", err);
                alert("Ocurrió un error al generar el PDF: " + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Registro de SW exitoso', reg))
                .catch(err => console.warn('Error al registrar SW', err));
        }
    </script>
</body>
