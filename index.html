<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario Alta Gracia - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;700&display=swap');

        body { font-family: 'Montserrat', sans-serif; background-color: #d1d5db; }
        .font-alta { font-family: 'Cinzel', serif; }

        .receta-container {
            width: 100%;
            max-width: 1122px;
            aspect-ratio: 1122 / 794;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            margin: auto;
        }

        #receta {
            width: 1122px;
            height: 794px;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            background: white;
        }

        .header-container {
            position: relative;
            height: 180px;
            width: 90%;
            left: 112px;
            background-color: #243e36 !important;
            mask-image: radial-gradient(circle at 0px 90px, transparent 110px, black 111px);
            -webkit-mask-image: radial-gradient(circle at 0px 90px, transparent 110px, black 111px);
        }

        .logo-circle {
            position: absolute;
            left: 3px;
            top: 25px;
            height: 130px;
        
            background: white;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .divider {
            position: absolute;
            left: 50%;
            top: 220px;
            bottom: 80px;
            width: 2px;
            background-color: #c2a37d;
            opacity: 0.3;
        }

        .footer-alta {
            background-color: #243e36 !important;
            height: 55px;
            width: 100%;
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="p-2 md:p-10">
    <div class="max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-6">

        <div id="panelControl" class="w-full lg:w-1/4 bg-white p-6 rounded-2xl shadow-xl border-t-8 border-[#243e36] h-fit">
            <h2 class="text-xl font-bold mb-4 text-[#243e36] flex items-center gap-2">
                <span>🦷</span> Panel de Control
            </h2>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Nombre del Paciente</label>
                    <input type="text" id="inPaciente" placeholder="Ej. Juan Pérez" class="w-full p-2 border rounded outline-none uppercase font-semibold text-sm">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Edad</label>
                        <input type="text" id="inEdad" placeholder="Edad" class="p-2 border rounded w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Fecha</label>
                        <input type="text" id="inFecha" class="p-2 border rounded bg-gray-100 text-gray-500 text-xs w-full" readonly>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Tipo Paciente</label>
                        <select id="selTipoPaciente" class="w-full p-2 border rounded bg-white font-bold text-sm">
                            <option value="adulto">Adulto</option>
                            <option value="nino">Niño</option>
                        </select>
                    </div>
                    <div id="divRangoNino" class="space-y-1 hidden">
                        <label class="text-[10px] font-bold text-blue-600 uppercase">Rango Edad</label>
                        <select id="selRangoNino" class="w-full p-2 border border-blue-200 rounded bg-blue-50 text-sm">
                            <option value="5-6">5 a 6 años</option>
                            <option value="2">2 años</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Procedimiento</label>
                    <select id="selProc" class="w-full p-2 border rounded bg-gray-50 font-bold text-gray-700 text-sm">
                        <option value="">Seleccionar...</option>
                        <option value="extraccion">Extracción Dental</option>
                        <option value="periodoncia">Periodoncia</option>
                        <option value="alveolitis">Alveolitis</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Prescripción</label>
                    <textarea id="inPres" rows="4" class="w-full p-2 border rounded text-sm italic"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Indicaciones</label>
                    <textarea id="inInd" rows="4" class="w-full p-2 border rounded text-[10px]"></textarea>
                </div>

                <button onclick="descargarPDF()" class="w-full bg-[#243e36] text-white py-4 rounded-xl font-bold hover:bg-black transition-all shadow-lg active:scale-95">
                    DESCARGAR PDF
                </button>
            </div>
        </div>

        <div class="w-full lg:w-3/4 flex justify-center items-start">
            <div id="recetaContainer" class="receta-container">
                <div id="receta">
                    <div class="logo-circle">
                        <img src="denta.png" alt="Logo" >
                    </div>
                    <div class="header-container">
                        <div class="absolute inset-0 flex flex-col justify-center items-center text-center pl-24 pr-10">
                            <h1 class="font-alta text-white text-3xl tracking-[0.2em] mb-1">Consultorio Odontológico</h1>
                            <h2 class="font-alta text-[#c2a37d] text-5xl font-bold tracking-[0.1em] uppercase">Alta Gracia</h2>
                            <div class="w-full flex justify-between px-10 mt-6 text-[13px] text-white/80 italic">
                                <div>CD. ANA PAULA GARCIA MIRANDA <span class="ml-4 text-[#c2a37d]">COP: 58688</span></div>
                                <div class="text-right leading-tight">CITAS: 936311361 <br> LEONCIO PRADO 960 _ HUAMACHUCO</div>
                            </div>
                        </div>
                    </div>

                    <div class="px-16 pt-12 pb-6 flex justify-between items-end text-[13px] font-bold text-gray-700">
                        <div class="flex-grow flex border-b border-gray-400 pb-1 italic uppercase">PACIENTE: <span id="pvPaciente" class="font-normal ml-3 text-black not-italic uppercase"></span></div>
                        <div class="w-32 flex border-b border-gray-400 pb-1 mx-6 italic uppercase">EDAD: <span id="pvEdad" class="font-normal ml-3 text-black not-italic"></span></div>
                        <div class="w-44 flex border-b border-gray-400 pb-1 justify-end italic uppercase">FECHA: <span id="pvFecha" class="font-normal ml-3 text-black not-italic"></span></div>
                    </div>

                    <div class="flex-grow flex px-16 py-8 relative">
                        <div class="divider"></div>
                        <div class="w-1/2 pr-12 z-10">
                            <h3 class="text-center font-bold text-gray-400 tracking-[0.4em] text-xs mb-8 uppercase">Prescripción</h3>
                            <div id="pvPres" class="text-[14px] text-gray-800 whitespace-pre-line leading-relaxed italic min-h-[300px]"></div>
                        </div>
                        <div class="w-1/2 pl-12 z-10">
                            <h3 class="text-center font-bold text-gray-400 tracking-[0.4em] text-xs mb-8 uppercase">Indicaciones</h3>
                            <div id="pvInd" class="text-[11px] text-gray-700 whitespace-pre-line leading-snug"></div>
                        </div>
                    </div>
                    <div class="footer-alta">
                        <p class="text-white text-[12px] tracking-[0.7em] font-light italic uppercase">¡ Cuidamos tu salud dental !</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
 async function descargarPDF() {
    const { PDFDocument, rgb, StandardFonts } = PDFLib;
    const btn = document.querySelector('button');
    const originalText = btn.innerText;
    
    btn.innerText = "GENERANDO...";
    btn.disabled = true;

    try {
        // 1. Crear documento
        const pdfDoc = await PDFDocument.create();
        
        // 2. Cargar la imagen de fondo
        // Nota: Si esto falla en local por CORS, prueba subiendo la imagen a un hosting o convirtiéndola a Base64
        const response = await fetch('plantilla.png');
        if (!response.ok) throw new Error("No se pudo cargar la imagen 'plantilla.png'");
        const imageBytes = await response.arrayBuffer();
        
        let fondoImg;
        try {
            fondoImg = await pdfDoc.embedPng(imageBytes);
        } catch (e) {
            // Si no es PNG, intentamos cargarlo como JPG
            fondoImg = await pdfDoc.embedJpg(imageBytes);
        }

        // 3. Añadir página (Tamaño A4 horizontal aprox: 1122x794 px a 96dpi)
        const page = pdfDoc.addPage([1122, 794]);
        const { width, height } = page.getSize();

        // Dibujar fondo
        page.drawImage(fondoImg, {
            x: 0,
            y: 0,
            width: width,
            height: height,
        });

        // 4. Configurar fuentes
        const fontRegular = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const fontItalic = await pdfDoc.embedFont(StandardFonts.HelveticaOblique);

        // 5. Capturar datos
        const nombre = document.getElementById('inPaciente').value.toUpperCase() || '';
        const edad = document.getElementById('inEdad').value || '';
        const fecha = document.getElementById('inFecha').value;
        const prescripcion = document.getElementById('inPres').value;
        const indicaciones = document.getElementById('inInd').value;

        const colorTexto = rgb(0, 0, 0); // Negro puro para mejor legibilidad al imprimir

        // 6. Posicionar texto (Y se cuenta desde abajo hacia arriba)
        // Datos cabecera
        page.drawText(nombre, { x: 155, y: 532, size: 14, font: fontRegular, color: colorTexto });
        page.drawText(edad, { x: 710, y: 532, size: 14, font: fontRegular, color: colorTexto });
        page.drawText(fecha, { x: 930, y: 532, size: 14, font: fontRegular, color: colorTexto });

        // Prescripción (Multi-línea)
        page.drawText(prescripcion, {
            x: 100,
            y: 460, 
            size: 13,
            font: fontItalic,
            lineHeight: 18,
            maxWidth: 420,
            color: colorTexto
        });

        // Indicaciones (Multi-línea)
        page.drawText(indicaciones, {
            x: 610,
            y: 460,
            size: 11,
            font: fontRegular,
            lineHeight: 15,
            maxWidth: 420,
            color: colorTexto
        });

        // 7. Generar y descargar
        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        
        // Método compatible con PC y Móvil
        const fileName = `Receta_${nombre.replace(/\s+/g, '_') || 'Paciente'}.pdf`;
        
        if (window.navigator && window.navigator.msSaveOrOpenBlob) {
            // Para IE/Edge antiguo
            window.navigator.msSaveOrOpenBlob(blob, fileName);
        } else {
            // Para Chrome, Firefox, Safari (incluido móviles)
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        }

    } catch (err) {
        console.error("Error al generar el PDF:", err);
        alert("Error: " + err.message);
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}
    </script>
</body>

</html>
