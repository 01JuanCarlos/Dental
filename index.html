<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario Alta Gracia - Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <link rel="manifest" href="/manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <meta name="theme-color" content="#000000">
</head>

<body class="p-2 md:p-10">
    <div class="max-w-[1600px] mx-auto flex flex-col lg:flex-row gap-6">
        <div id="panelControl"
            class="w-full lg:w-1/4 bg-slate-50 p-8 rounded-3xl shadow-2xl border-t-[10px] border-[#243e36] h-fit">
            <header class="mb-8">
                <h2 class="text-2xl font-bold text-[#243e36] flex items-center gap-3">
                    <i data-lucide="file-text" class="w-6 h-6"></i>
                    Hacer Receta
                </h2>
                <p class="text-gray-500 text-xs mt-1">Complete los campos para generar la orden médica.</p>
            </header>

            <div class="space-y-6">
                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36] transition-colors">
                        Nombre del Paciente
                    </label>
                    <div class="relative">
                        <i data-lucide="user"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="inPaciente" placeholder="Ej. Juan Pérez"
                            class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl outline-none uppercase font-semibold text-sm transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10 shadow-sm">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Edad</label>
                        <input type="number" id="inEdad" placeholder="00"
                            class="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none text-sm transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10">
                    </div>
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1 ml-1">Fecha</label>
                        <div class="relative">
                            <i data-lucide="calendar"
                                class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input type="text" id="inFecha" readonly
                                class="w-full pl-10 pr-2 py-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-500 text-xs cursor-not-allowed">
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="group">
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Tipo
                            de Paciente</label>
                        <select id="selTipoPaciente"
                            class="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none font-bold text-sm appearance-none cursor-pointer focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10">
                            <option value="adulto">Adulto</option>
                            <option value="nino">Niño</option>
                        </select>
                    </div>

                    <div id="divRangoNino" class="hidden animate-fade-in">
                        <label
                            class="block text-[11px] font-bold text-blue-600 uppercase tracking-wider mb-1 ml-1">Rango
                            de Edad Infantil</label>
                        <select id="selRangoNino"
                            class="w-full p-3 bg-blue-50 border border-blue-200 rounded-xl text-sm text-blue-800 outline-none">
                            <option value="5-6">5 a 6 años</option>
                            <option value="2">2 años</option>
                        </select>
                    </div>
                </div>

                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Procedimiento</label>
                    <div class="relative">
                        <i data-lucide="stethoscope"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <select id="selProc"
                            class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl outline-none font-bold text-gray-700 text-sm appearance-none cursor-pointer focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10">
                            <option value="">Seleccionar...</option>
                            <option value="extraccion">Extracción Dental</option>
                            <option value="periodoncia">Periodoncia</option>
                            <option value="alveolitis">Alveolitis</option>
                        </select>
                    </div>
                </div>

                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Prescripción
                        Médica</label>
                    <textarea id="inPres" rows="3" placeholder="Medicamentos y dosis..."
                        class="w-full p-4 bg-white border border-gray-200 rounded-xl outline-none text-sm italic transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10 resize-none"></textarea>
                </div>

                <div class="group">
                    <label
                        class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-[#243e36]">Indicaciones
                        Adicionales</label>
                    <textarea id="inInd" rows="3" placeholder="Recomendaciones de cuidado..."
                        class="w-full p-4 bg-white border border-gray-200 rounded-xl outline-none text-[12px] italic transition-all focus:border-[#243e36] focus:ring-4 focus:ring-[#243e36]/10 resize-none"></textarea>
                </div>


                <button id="btn-generate" onclick="procesarReceta()"
                    class="w-full bg-[#243e36] text-white py-5 rounded-2xl font-bold hover:bg-[#1a2d27] transition-all shadow-xl hover:shadow-[#243e36]/20 active:scale-95 flex items-center justify-center gap-2 mt-4">
                    GENERAR RECETA
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 26" width="24" height="24" fill="#FFF"
                        fill-rule="evenodd">
                        <path
                            d="M13 26C5.82 26 0 20.18 0 13S5.82 0 13 0s13 5.82 13 13-5.82 13-13 13zm0-2c6.075 0 11-4.925 11-11S19.075 2 13 2 2 6.925 2 13s4.925 11 11 11z"
                            fill-rule="nonzero"></path>
                        <path
                            d="M18.684 13.105a.55.55 0 0 1-.148.378l-5.263 5.263a.55.55 0 0 1-.378.148.54.54 0 0 1-.526-.526V15.21H7.842a.54.54 0 0 1-.526-.526v-3.158A.54.54 0 0 1 7.842 11h4.526V7.842a.52.52 0 0 1 .526-.526c.148 0 .28.066.395.164l5.247 5.247a.55.55 0 0 1 .148.378z">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="modalSuccess" class="modal-overlay">
                <div class="modal-content" style="display: flex;align-items: center;justify-content: center;flex-direction: column;">
                    <img src="icon-succes.png" alt="">
                    <h3 class="text-2xl font-bold text-[#243e36] flex items-center gap-3">¡Receta Lista!</h3>

                    <div class="modal-buttons" style=" width: 100%;">
                        <button id="downloadLink" class="btn-modal btn-download">
                            <i data-lucide="download-cloud" class="w-5 h-5"></i> Descargar PDF
                        </button>

                        <button onclick="compartirWhatsApp()" class="btn-modal btn-whatsapp">
                            <i data-lucide="share-2" class="w-5 h-5"></i>Compartir
                        </button>

                        <button class="btn-close" onclick="cerrarModal()">Cerrar</button>
                    </div>

                </div>
            </div>
        </div>
        <div class="w-full lg:w-3/4 flex justify-center items-start">
            <div id="recetaContainer" class="receta-container">
                <div id="receta">
                    <div class="logo-circle">
                        <img src="denta.png" alt="Logo">
                    </div>
                    <div class="header-container">
                        <div class="absolute inset-0 flex flex-col justify-center items-center text-center pl-24 pr-10">
                            <h1 class="font-alta text-white text-3xl tracking-[0.2em] mb-1">Consultorio Odontológico
                            </h1>
                            <h2 class="font-alta text-[#c2a37d] text-5xl font-bold tracking-[0.1em] uppercase">Alta
                                Gracia</h2>
                            <div class="w-full flex justify-between px-10 mt-6 text-[13px] text-white/80 italic">
                                <div>CD. ANA PAULA GARCIA MIRANDA <span class="ml-4 text-[#c2a37d]">COP: 58688</span>
                                </div>
                                <div class="text-right leading-tight">CITAS: 936311361 <br> LEONCIO PRADO 960 _
                                    HUAMACHUCO</div>
                            </div>
                        </div>
                    </div>

                    <div class="px-16 pt-12 pb-6 flex justify-between items-end text-[13px] font-bold text-gray-700">
                        <div class="flex-grow flex border-b border-gray-400 pb-1 italic uppercase">PACIENTE: <span
                                id="pvPaciente" class="font-normal ml-3 text-black not-italic uppercase"></span></div>
                        <div class="w-32 flex border-b border-gray-400 pb-1 mx-6 italic uppercase">EDAD: <span
                                id="pvEdad" class="font-normal ml-3 text-black not-italic"></span></div>
                        <div class="w-44 flex border-b border-gray-400 pb-1 justify-end italic uppercase">FECHA: <span
                                id="pvFecha" class="font-normal ml-3 text-black not-italic"></span></div>
                    </div>

                    <div class="flex-grow flex px-16 py-8 relative">
                        <div class="divider"></div>
                        <div class="w-1/2 pr-12 z-10">
                            <h3 class="text-center font-bold text-gray-400 tracking-[0.4em] text-xs mb-8 uppercase">
                                Prescripción</h3>
                            <div id="pvPres"
                                class="text-[14px] text-gray-800 whitespace-pre-line leading-relaxed italic min-h-[300px]">
                            </div>
                        </div>
                        <div class="w-1/2 pl-12 z-10">
                            <h3 class="text-center font-bold text-gray-400 tracking-[0.4em] text-xs mb-8 ">
                                Indicaciones</h3>
                            <div id="pvInd"
                                class="text-[14px] text-gray-800 whitespace-pre-line leading-relaxed italic min-h-[300px]">
                            </div>
                        </div>
                    </div>
                    <div class="footer-alta">
                        <p class="text-white text-[12px] tracking-[0.7em] font-light italic uppercase">¡ Cuidamos tu
                            salud dental !</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
    <script>
        // --- LÓGICA DE GENERACIÓN Y MANEJO DE ARCHIVO ---

        let pdfBlobUrl = null;
        let nombreArchivo = "";

        async function procesarReceta() {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const btn = document.querySelector('#btn-generate');
            const originalContent = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> GENERANDO...`;

            try {
                const pdfDoc = await PDFDocument.create();

                const response = await fetch('plantilla.png');
                if (!response.ok) throw new Error("No se pudo cargar 'plantilla.png'.");
                const imageBytes = await response.arrayBuffer();

                let fondoImg;
                try {
                    fondoImg = await pdfDoc.embedPng(imageBytes);
                } catch (e) {
                    fondoImg = await pdfDoc.embedJpg(imageBytes);
                }

                const page = pdfDoc.addPage([1122, 794]);
                const { width, height } = page.getSize();
                page.drawImage(fondoImg, { x: 0, y: 0, width: width, height: height });

                const fontRegular = await pdfDoc.embedFont(StandardFonts.Helvetica);
                const fontItalic = await pdfDoc.embedFont(StandardFonts.HelveticaOblique);

                const nombre = document.getElementById('inPaciente').value.toUpperCase() || 'PACIENTE';
                const edad = document.getElementById('inEdad').value || '';
                const fecha = document.getElementById('inFecha').value || '';
                const prescripcion = document.getElementById('inPres').value || '';
                const indicaciones = document.getElementById('inInd').value || '';

                const colorTexto = rgb(0, 0, 0);

                // Dibujar Textos
                page.drawText(nombre, { x: 155, y: 597, size: 14, font: fontRegular, color: colorTexto });
                page.drawText(edad, { x: 750, y: 597, size: 14, font: fontRegular, color: colorTexto });
                page.drawText(fecha, { x: 1015, y: 597, size: 14, font: fontRegular, color: colorTexto });

                page.drawText(prescripcion, {
                    x: 100, y: 460, size: 13, font: fontItalic,
                    lineHeight: 18, maxWidth: 420, color: colorTexto
                });

                page.drawText(indicaciones, {
                    x: 610, y: 460, size: 13, font: fontItalic,
                    lineHeight: 18, maxWidth: 420, color: colorTexto
                });

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });

                if (pdfBlobUrl) URL.revokeObjectURL(pdfBlobUrl);

                pdfBlobUrl = URL.createObjectURL(blob);
                nombreArchivo = `Receta_${nombre.replace(/\s+/g, '_')}.pdf`;

                // IMPORTANTE: Pasamos el nombre para que el modal lo guarde
                abrirModal(nombre);

            } catch (err) {
                console.error("Error:", err);
                alert("Error: " + err.message);
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        // --- FUNCIONES DEL MODAL ---

        function abrirModal(nombrePaciente) {
            const modal = document.getElementById('modalSuccess');
            const btnDown = document.getElementById('downloadLink');

            // CORRECCIÓN 1: Guardar el nombre en el dataset para que compartirWhatsApp pueda leerlo
            modal.dataset.paciente = nombrePaciente;

            btnDown.onclick = () => {
                const a = document.createElement('a');
                a.href = pdfBlobUrl;
                a.download = nombreArchivo;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            modal.style.display = 'flex';
        }

        async function compartirWhatsApp() {
            // CORRECCIÓN 2: Leer el nombre correctamente del dataset del modal
            const nombrePaciente = document.getElementById('modalSuccess').dataset.paciente || "Paciente";

            // Intentamos usar la API nativa de compartir (Móviles modernos)
            if (navigator.share && navigator.canShare) {
                try {
                    const response = await fetch(pdfBlobUrl);
                    const blob = await response.blob();
                    const file = new File([blob], nombreArchivo, { type: 'application/pdf' });

                    // Verificamos si realmente podemos compartir archivos
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            title: 'Receta Médica',
                            text: `Hola, adjunto la receta médica de ${nombrePaciente}`,
                            files: [file]
                        });
                    } else {
                        throw new Error("Compartir archivos no soportado");
                    }
                } catch (err) {
                    // Plan B si falla el compartir archivo
                    abrirLinkWhatsApp(nombrePaciente);
                }
            } else {
                // Plan B para PC
                abrirLinkWhatsApp(nombrePaciente);
            }
        }

        function abrirLinkWhatsApp(nombre) {
            const mensaje = encodeURIComponent(`Hola, la receta de ${nombre} está lista. Por favor descárguela.`);
            window.open(`https://wa.me/?text=${mensaje}`, '_blank');
        }

        function cerrarModal() {
            document.getElementById('modalSuccess').style.display = 'none';
        }

        window.onclick = function (event) {
            const modal = document.getElementById('modalSuccess');
            if (event.target == modal) cerrarModal();
        };
    </script>
</body>

</html>
